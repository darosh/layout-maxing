<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>layout-maxing-bench</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #0d1117;
        color: #c9d1d9;
        margin: 0;
        padding: 1rem;
      }
      h1,
      h2 {
        margin: 0 0 0.5rem;
        font-weight: 500;
      }
      h1 {
        font-size: 1.1rem;
      }
      h2 {
        font-size: 0.95rem;
        color: #8b949e;
        margin-top: 1.25rem;
      }
      .grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1fr 1fr;
      }
      .card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 0.75rem 1rem;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        font-size: 0.82rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.25rem 0.5rem;
        border-bottom: 1px solid #21262d;
      }
      th {
        color: #8b949e;
        font-weight: 500;
      }
      .ok {
        color: #3fb950;
      }
      .err {
        color: #f85149;
      }
      .muted {
        color: #6e7681;
      }
      canvas {
        background: #0d1117;
        border: 1px solid #21262d;
        border-radius: 4px;
      }
      select {
        background: #0d1117;
        color: #c9d1d9;
        border: 1px solid #30363d;
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <h1
      >layout-maxing-bench
      <span
        class="muted"
        id="ts"></span
    ></h1>
    <div class="grid">
      <div class="card">
        <h2>best per example (score_default)</h2>
        <table id="best"></table>
      </div>
      <div class="card">
        <h2>recent runs</h2>
        <table id="recent"></table>
      </div>
      <div
        class="card"
        style="grid-column: 1/3">
        <h2>
          trend &nbsp; group
          <select id="group"></select>
          example
          <select id="example"></select>
          x
          <select id="xparam"></select>
        </h2>
        <canvas
          id="scatter"
          width="1200"
          height="380"></canvas>
      </div>
      <div
        class="card"
        style="grid-column: 1/3">
        <h2>phase progress</h2>
        <table id="counts"></table>
      </div>
    </div>
    <script
      type="module"
      src="/app.js"></script>
  </body>
</html>
